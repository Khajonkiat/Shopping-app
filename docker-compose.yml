version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-shopping_app}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-shopping_app}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/khajonkiat/shopping-app/backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-shopping_app}
      DB_SSLMODE: ${DB_SSLMODE:-disable}
      SERVER_PORT: "8080"
      JWT_SECRET: ${JWT_SECRET}
      MASTER_EMAIL: ${MASTER_EMAIL}
      MASTER_USERNAME: ${MASTER_USERNAME:-master}
      MASTER_PASSWORD: ${MASTER_PASSWORD}
    volumes:
      - uploads:/app/uploads
    ports:
      - "8080:8080"

  frontend:
    image: ghcr.io/khajonkiat/shopping-app/frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
    ports:
      - "3000:3000"

volumes:
  pgdata:
  uploads:
